name: Update Lean Project

on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight UTC
  workflow_dispatch: # allows workflow to be triggered manually

jobs:
  update_lean:
    permissions:
      contents: write
      pull-requests: write
      issues: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
          python-version: "3.13"

      - name: Update Lean project
        id: lean-update
        uses: leanprover-community/lean-update@v0.7.0
        with:
          update_if_modified: lean-toolchain
          on_update_succeeds: pr
          on_update_fails: issue

      - name: Enable auto-merge on update PR
        if: steps.lean-update.outputs.result == 'update-success'
        run: |
          PR_NUMBER=$(gh pr list --head "auto-update-lean/patch" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "Enabling auto-merge for PR #$PR_NUMBER"
            gh pr merge --auto --squash "$PR_NUMBER"
          else
            echo "No PR found to auto-merge"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
